<!--
  IYARKAI'N AURA — JSON-driven landing page
  ==========================================
  This page renders ENTIRELY from the JSON files in /data — nothing in this
  file needs to change when products, reviews, FAQs, gallery photos or
  contact details change. Edit the JSON, commit, push — GitHub Pages
  reflects it automatically.

    data/site.json      brand, hero, nav, why-us, story, CTA, contact, footer, SEO
    data/products.json  every product card on the page
    data/reviews.json   every testimonial card
    data/faq.json       every FAQ accordion item
    data/gallery.json   every gallery photo + lightbox caption

  See README.md for the full JSON schema reference.

  NOTE: fetch() of local JSON is blocked by browsers under file:// — serve
  this folder with any static server to preview locally (`python -m
  http.server`, VS Code "Live Server", etc). GitHub Pages serves it over
  HTTPS automatically, so no setup is needed once deployed.
-->

<!--
  Schema.org — minimal no-JS/social-scraper fallback only.
  Once JavaScript runs, js/seo.js replaces this with a full, data-driven
  set (Organization+LocalBusiness, every Product, FAQPage, AggregateRating)
  built live from data/site.json, products.json, reviews.json & faq.json —
  see that file, not this tag, to change what search engines see.
-->
<script type="application/ld+json" id="schema-org">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Iyarkai'n Aura",
  "description": "Handmade, 100% natural face creams, herbal hair oils and gels.",
  "image": "https://kanagasundar.github.io/iyarkai-n-aura/assets/img/og-cover.jpg",
  "url": "https://kanagasundar.github.io/iyarkai-n-aura/"
}
</script>
